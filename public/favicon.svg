<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="vinyl-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1818" />
      <stop offset="60%" stop-color="#2a2622" />
      <stop offset="100%" stop-color="#0e0c0a" />
    </radialGradient>
  </defs>
  <rect width="32" height="32" fill="#e8e5d5" />
  <g transform-origin="16 16">
    <circle cx="16" cy="16" r="14" fill="url(#vinyl-grad)" />
    <circle cx="16" cy="16" r="11" fill="none" stroke="#3a342f" stroke-width="0.4" opacity="0.7" />
    <circle cx="16" cy="16" r="9" fill="none" stroke="#3a342f" stroke-width="0.4" opacity="0.55" />
    <circle cx="16" cy="16" r="7" fill="none" stroke="#3a342f" stroke-width="0.4" opacity="0.45" />
    <circle cx="16" cy="16" r="4.5" fill="#a8634c" />
    <circle cx="16" cy="16" r="0.9" fill="#0e0c0a" />
    <!-- Off-centre highlight to make rotation visible -->
    <circle cx="11.5" cy="13" r="0.7" fill="#e8e5d5" opacity="0.55" />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 16 16"
      to="360 16 16"
      dur="6s"
      repeatCount="indefinite"
    />
  </g>
</svg>
